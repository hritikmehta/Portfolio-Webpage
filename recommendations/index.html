<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hritik's Picks — Recommended Products</title>
    <meta name="description" content="Curated product recommendations by Hritik Mehta — things I genuinely use and love.">
    <link rel="stylesheet" href="/recommendations/styles.css">
    <link rel="icon" href="/assets/favicon.png" type="image/png">
</head>
<body>

    <main class="page">

        <!-- Header -->
        <header class="header" id="page-header">
            <a href="/links/" class="header__back" id="back-link" aria-label="Back to links">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            </a>
            <div class="header__text">
                <h1 class="header__title" id="page-title">My Picks</h1>
                <p class="header__subtitle" id="page-subtitle">Things I genuinely use & love</p>
            </div>
        </header>

        <!-- Category Filter -->
        <nav class="filters" id="category-filters" aria-label="Filter by category">
            <!-- Rendered by JS from data.json -->
        </nav>

        <!-- Product Grid -->
        <section class="products" id="products-grid" aria-label="Product recommendations">
            <!-- Rendered by JS from data.json -->
        </section>

        <!-- Footer -->
        <footer class="footer" id="page-footer">
            <p class="footer__text">Curated with care · <a href="/links/">hritikm.com</a></p>
        </footer>

    </main>

    <script src="/recommendations/script.js"></script>
</body>
</html>
