<svg width="1080" height="1350" viewBox="0 0 1080 1350" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Tried products recommendation page mockup</title>
  <desc id="desc">Poster style mockup inviting visitors to check tried products and reviews.</desc>
  <defs>
    <linearGradient id="bg" x1="90" y1="40" x2="1020" y2="1310" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F1021"/>
      <stop offset="1" stop-color="#1D0D3F"/>
    </linearGradient>
    <linearGradient id="cta" x1="220" y1="908" x2="850" y2="908" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF8A00"/>
      <stop offset="1" stop-color="#FF4D9E"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1350" fill="#0A0A14"/>
  <rect x="45" y="45" width="990" height="1260" rx="44" fill="url(#bg)" stroke="#9A6BFF" stroke-width="2"/>

  <text x="120" y="170" fill="#8CE6FF" font-size="38" font-family="Inter, Arial, sans-serif" letter-spacing="0.08em">NEW PAGE IDEA</text>
  <text x="120" y="290" fill="#FFFFFF" font-size="88" font-family="Fraunces, Georgia, serif" font-weight="700">Tried Products</text>
  <text x="120" y="370" fill="#FFFFFF" font-size="88" font-family="Fraunces, Georgia, serif" font-weight="700">by Hritik</text>

  <text x="120" y="470" fill="#D4D5E8" font-size="40" font-family="Inter, Arial, sans-serif">Amazon links + personal reviews + real photos</text>

  <rect x="120" y="550" width="840" height="290" rx="24" fill="#11152B" stroke="#4DD8FF" stroke-opacity="0.45"/>
  <text x="170" y="640" fill="#BDE7FF" font-size="34" font-family="Inter, Arial, sans-serif">Recos page route:</text>
  <text x="170" y="720" fill="#FFFFFF" font-size="62" font-family="IBM Plex Mono, monospace">hritikm.com/recos</text>
  <text x="170" y="790" fill="#B7BDD7" font-size="30" font-family="Inter, Arial, sans-serif">Instagram bio friendly landing page</text>

  <rect x="220" y="860" width="630" height="96" rx="48" fill="url(#cta)"/>
  <text x="270" y="922" fill="#120A25" font-size="40" font-family="Inter, Arial, sans-serif" font-weight="700">Checkout my tried products</text>

  <rect x="120" y="1020" width="190" height="190" rx="20" fill="#191E3D"/>
  <rect x="340" y="1020" width="190" height="190" rx="20" fill="#191E3D"/>
  <rect x="560" y="1020" width="190" height="190" rx="20" fill="#191E3D"/>
  <rect x="780" y="1020" width="180" height="190" rx="20" fill="#191E3D"/>
</svg>
