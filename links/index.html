<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hritik Mehta — Links</title>
    <meta name="description" content="Hritik Mehta — Explore my work, writing, and curated recommendations.">
    <link rel="stylesheet" href="/links/styles.css">
    <link rel="icon" href="/assets/favicon.png" type="image/png">
</head>
<body>

    <!-- Ambient grain overlay -->
    <div class="grain-overlay" aria-hidden="true"></div>

    <main class="container">

        <!-- Profile Section -->
        <header class="profile">
            <div class="profile__avatar-ring">
                <div class="profile__avatar" id="profile-avatar">
                    <img src="/assets/favicon.png" alt="Hritik Mehta" class="profile__avatar-img">
                </div>
            </div>
            <h1 class="profile__name" id="profile-name">HRITIK MEHTA</h1>
            <p class="profile__tagline" id="profile-tagline">We can follow multiple interests, try it</p>
        </header>

        <!-- Links Section -->
        <nav class="links" aria-label="Quick links">

            <!-- 1. Recommended Products (moved to top) -->
            <a href="/recommendations/" class="link-chip" id="link-recommendations">
                <span class="link-chip__icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.56 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/></svg>
                </span>
                <span class="link-chip__label">Recommended products</span>
                <span class="link-chip__arrow">→</span>
            </a>

            <!-- 2. Read my writing (updated Medium URL) -->
            <a href="https://medium.com/@hritik999" target="_blank" rel="noopener noreferrer" class="link-chip" id="link-medium">
                <span class="link-chip__icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M13.54 12a6.8 6.8 0 01-6.77 6.82A6.8 6.8 0 010 12a6.8 6.8 0 016.77-6.82A6.8 6.8 0 0113.54 12zm7.42 0c0 3.54-1.51 6.42-3.38 6.42-1.87 0-3.39-2.88-3.39-6.42s1.52-6.42 3.39-6.42 3.38 2.88 3.38 6.42M24 12c0 3.17-.53 5.75-1.19 5.75-.66 0-1.19-2.58-1.19-5.75s.53-5.75 1.19-5.75C23.47 6.25 24 8.83 24 12z"/></svg>
                </span>
                <span class="link-chip__label">Read my writing</span>
                <span class="link-chip__arrow">→</span>
            </a>

            <!-- 3. GitHub (new) -->
            <a href="https://github.com/hritikmehta" target="_blank" rel="noopener noreferrer" class="link-chip" id="link-github">
                <span class="link-chip__icon">
                    <img src="/assets/favicon.png" alt="GitHub" style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;">
                </span>
                <span class="link-chip__label">Explore on GitHub</span>
                <span class="link-chip__arrow">→</span>
            </a>

            <!-- 4. Follow on X -->
            <a href="https://twitter.com/hritikmehta" target="_blank" rel="noopener noreferrer" class="link-chip" id="link-twitter">
                <span class="link-chip__icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                </span>
                <span class="link-chip__label">Follow on X</span>
                <span class="link-chip__arrow">→</span>
            </a>

            <!-- 5. Connect on LinkedIn -->
            <a href="https://linkedin.com/in/hritikmehta" target="_blank" rel="noopener noreferrer" class="link-chip" id="link-linkedin">
                <span class="link-chip__icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
                </span>
                <span class="link-chip__label">Connect on LinkedIn</span>
                <span class="link-chip__arrow">→</span>
            </a>

            <!-- 6. View portfolio -->
            <a href="/" class="link-chip" id="link-portfolio">
                <span class="link-chip__icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
                </span>
                <span class="link-chip__label">View portfolio</span>
                <span class="link-chip__arrow">→</span>
            </a>

        </nav>

        <!-- Footer -->
        <footer class="footer">
            <p class="footer__text">hritikm.com</p>
        </footer>

    </main>

    <script src="/links/script.js"></script>
</body>
</html>
